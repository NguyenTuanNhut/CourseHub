services:
  mysql:
    image: mysql:8.4
    container_name: course-grading-mysql
    environment:
      MYSQL_DATABASE: course_grading_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${MYSQL_USER:-course_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-course_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: course-grading-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
